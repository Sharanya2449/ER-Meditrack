{% extends "base.html" %}
{% block content %}

<div class="card shadow-sm">
  <div class="card-body">
    <h5 class="card-title">Admin: Update ER Status</h5>
    <p class="text-muted small">Updates beds + wait time (simulates doctor/staff updates).</p>

    <div class="mb-2">
      <label class="form-label">Admin Key (from .env)</label>
      <input class="form-control" id="adminKey" placeholder="1234">
    </div>

    <div class="row g-2">
      <div class="col-md-3">
        <label class="form-label">Hospital ID</label>
        <input class="form-control" id="hospitalId" type="number" placeholder="1">
      </div>
      <div class="col-md-3">
        <label class="form-label">Total Beds</label>
        <input class="form-control" id="totalBeds" type="number" placeholder="10">
      </div>
      <div class="col-md-3">
        <label class="form-label">Occupied Beds</label>
        <input class="form-control" id="occupiedBeds" type="number" placeholder="7">
      </div>
      <div class="col-md-3">
        <label class="form-label">Avg Wait (minutes)</label>
        <input class="form-control" id="waitMins" type="number" placeholder="25">
      </div>
    </div>

    <button id="btnUpdate" class="btn btn-danger w-100 mt-3">Update</button>
    <div id="adminStatus" class="small text-muted mt-2"></div>

    <div class="alert alert-info mt-3 mb-0">
      Tip: IDs are usually 1, 2, 3 after seeding. Update Metro (2) occupied beds to 6 to create vacancy.
    </div>
  </div>
</div>

{% endblock %}
