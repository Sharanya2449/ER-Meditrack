{% extends "hospital_base.html" %}
{% block content %}

<div class="card shadow-sm">
  <div class="card-body">
    <h4> ER Status</h4>
    <p class="text-muted small">Updates are instantly reflected in ER MediTrack.</p>

    <div class="row g-2">
      <div class="col-md-3">
        <label class="form-label">Admin Key</label>
        <input id="adminKey" class="form-control" placeholder="1234">
      </div>
      <div class="col-md-3">
        <label class="form-label">Total Beds</label>
        <input id="totalBeds" class="form-control" type="number" value="{{ h.total_beds or 10 }}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Occupied Beds</label>
        <input id="occupiedBeds" class="form-control" type="number" value="{{ h.occupied_beds or 6 }}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Avg Wait (min)</label>
        <input id="waitMins" class="form-control" type="number" value="{{ h.avg_wait_minutes or 20 }}">
      </div>
    </div>

    <button class="btn btn-primary w-100 mt-3" id="btnSave"
      data-hospital-id="{{ h.hospital_id }}">Save Update</button>

    <div class="small text-muted mt-2" id="statusMessage"></div>

    <hr/>
    <div class="alert alert-info mb-0">
      Tip: After saving, open ER MediTrack and refresh.
    </div>
  </div>
</div>

{% endblock %}
