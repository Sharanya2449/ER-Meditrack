<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{{ h.name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <header class="bg-primary text-white">
    <div class="container py-3">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h3 class="mb-0">{{ h.name }}</h3>
          <div class="small">{{ h.address }}</div>
        </div>
        <div class="text-end">
          <div class="fw-bold">24×7 Emergency</div>
          <div class="small">
            Helpline: <a class="text-white" href="tel:{{ h.phone }}">{{ h.phone }}</a>
          </div>
        </div>
      </div>
    </div>

    <nav class="bg-dark">
      <div class="container py-2 d-flex gap-3">
        <a class="text-white text-decoration-none" href="/h/{{ h.hospital_id }}/home">Home</a>
        <a class="text-white text-decoration-none" href="/h/{{ h.hospital_id }}/emergency">Emergency</a>
        <a class="text-white text-decoration-none" href="/h/{{ h.hospital_id }}/services">Services</a>
        <a class="text-white text-decoration-none" href="/h/{{ h.hospital_id }}/contact">Contact</a>
        <a class="text-white text-decoration-none" href="/h/{{ h.hospital_id }}/staff">Staff Portal</a>
        
      </div>
    </nav>
  </header>

  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

  <footer class="border-top py-3">
    <div class="container small text-muted">
      MediTrack ER Portal • Live hospital status • {{ h.name }}
    </div>
  </footer>

  <script src="/static/hospital.js"></script>
</body>
</html>
