{% extends "hospital_directory_base.html" %}
{% block content %}

<div class="card shadow-sm">
  <div class="card-body">
    <h5 class="card-title">Hospital Directory</h5>
    <form method="GET" class="d-flex gap-2">
      <input class="form-control" name="q" value="{{ q }}" placeholder="Search: chembur, byculla, sanpada…" />
      <button class="btn btn-danger">Search</button>
    </form>
  </div>
</div>

<div class="mt-3">
  {% for h in hospitals %}
    <div class="card shadow-sm mb-2">
      <div class="card-body">
        <h6 class="mb-1">{{ h.name }}</h6>
        <div class="small text-muted">{{ h.address }}</div>

        <div class="d-flex gap-2 mt-2 flex-wrap">
          <a class="btn btn-outline-primary btn-sm" href="{{ h.home_url }}">View Website</a>
          <a class="btn btn-outline-secondary btn-sm" href="{{ h.staff_url }}">Staff Update</a>
          <a class="btn btn-outline-danger btn-sm" href="{{ h.maps_url }}" target="_blank">Get Directions</a>
        </div>
      </div>
    </div>
  {% endfor %}

  {% if hospitals|length == 0 %}
    <div class="alert alert-warning mt-3">No hospitals matched your search.</div>
  {% endif %}
</div>

{% endblock %}
