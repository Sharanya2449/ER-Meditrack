{% extends "hospital_base.html" %}
{% block content %}

<div class="card shadow-sm">
  <div class="card-body">
    <h4>Contact</h4>

    <div class="mt-2">Address: <b>{{ h.address }}</b></div>
    <div>Phone: <a href="tel:{{ h.phone }}">{{ h.phone }}</a></div>
    <div>Email: <a href="mailto:{{ h.email }}">{{ h.email }}</a></div>

    <hr/>
    <a class="btn btn-primary" href="/">Open ER MediTrack</a>
  </div>
</div>

{% endblock %}
